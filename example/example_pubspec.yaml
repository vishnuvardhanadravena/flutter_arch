name: my_app
description: A Flutter app created with Flutter Architecture CLI
version: 1.0.0+1

environment:
  sdk: ^3.12.1
  flutter: ">=3.13.0"

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_bloc: ^8.1.0
  bloc: ^8.1.0
  
  # HTTP & Networking
  dio: ^5.3.0
  
  # Local Storage
  hive: ^2.2.0
  hive_flutter: ^1.1.0
  
  # Secure Storage
  flutter_secure_storage: ^9.0.0
  
  # Dependency Injection
  get_it: ^7.5.0
  
  # Additional UI
  cached_network_image: ^3.3.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  flutter_lints: ^3.0.0
  
  # Code Generation
  build_runner: ^2.4.0
  hive_generator: ^2.0.0

flutter:
  uses-material-design: true

# Build Flavors Configuration
# To run with different flavors:
# flutter run -t lib/main_dev.dart --flavor dev
# flutter run -t lib/main_qa.dart --flavor qa
# flutter run -t lib/main_prod.dart --flavor prod
